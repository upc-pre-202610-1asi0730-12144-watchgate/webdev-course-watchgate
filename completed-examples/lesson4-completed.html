<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mi tarjeta de colección</title>

    <!-- conecta el archivo css -->
    <link rel="stylesheet" href="../completed-examples/lesson5-completed.css">

</head>

<body>

    <!-- Objetivo: agregar elementos visuales a la tarjeta -->

    <div>
        <!-- 1. Agregar un título y subtítulo con (h1 y h2) -->
        <h1>Tarjeta de colección</h1>

        <h2>Messi</h2>

        <p>
            Es un jugador de futbol considerado como uno de los mejores futbolistas de la historia.
            Con un gran paso por el FC Barcelona.
        </p>

        <!-- 2. Agrega una imagen con (img) -->
        <!-- Ejemplo:
        <img src="url-de-la-imagen" alt="Descripcion de la imagen">
        -->
        <!-- imagen del personaje -->
        <img src="https://static.messi.com/wp-content/uploads/2022/12/WhatsApp-Image-2022-12-18-at-22.10.57-1.jpeg?v=1671398247" alt="Imagen de Messi">

        <!-- 3. Agrega una lista de atributos usando ul y li -->
        <!-- Ejemplo:
        <ul>
            <li>Velocidad: 90</li>
            <li>Fuerza: 80</li>
            <li>Defensa: 70</li>
        </ul>
        -->
        <ul>
            <li>Velocidad: 90</li>
            <li>Tiro: 89</li>
            <li>Defensa: 60</li>
        </ul>

        <!-- 4. Agrega un enlace con (a) -->
        <!-- Ejemplo:
        <a href="https://example.com">
            ver más información
        </a>
        -->
        <a href="https://es.wikipedia.org/wiki/Lionel_Messi" target="_blank">
            Ver más información
        </a>

    </div>

</body>
</html>
